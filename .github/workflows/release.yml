name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rewrite GitHub SSH URLs to HTTPS
        run: |
          git config --global 'url.https://github.com/.insteadOf' 'git@github.com:'
          git config --global --add 'url.https://github.com/.insteadOf' 'ssh://git@github.com/'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""
          target: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build release binary
        run: cargo build -p end-cli --release --locked --target ${{ matrix.target }}

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-manual}"
          out_dir="dist"
          mkdir -p "${out_dir}"

          bin="end-cli"
          src="target/${{ matrix.target }}/release/${bin}"
          pkg="${bin}-${version}-${{ matrix.target }}"
          stage_dir="$(mktemp -d)"
          cp "${src}" "${stage_dir}/${bin}"
          tar -czf "${out_dir}/${pkg}.${{ matrix.archive_ext }}" -C "${stage_dir}" "${bin}"

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "manual" }
          $outDir = "dist"
          New-Item -Path $outDir -ItemType Directory -Force | Out-Null

          $bin = "end-cli"
          $src = "target/${{ matrix.target }}/release/$bin.exe"
          $pkg = "$bin-$version-${{ matrix.target }}"
          $stageDir = Join-Path $env:RUNNER_TEMP "release-stage"
          New-Item -Path $stageDir -ItemType Directory -Force | Out-Null
          $stagedExe = Join-Path $stageDir "$bin.exe"
          Copy-Item $src $stagedExe
          Compress-Archive -Path $stagedExe -DestinationPath "$outDir/$pkg.${{ matrix.archive_ext }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
