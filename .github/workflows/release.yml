name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cli:
    name: Build CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rewrite GitHub SSH URLs to HTTPS
        run: |
          git config --global 'url.https://github.com/.insteadOf' 'git@github.com:'
          git config --global --add 'url.https://github.com/.insteadOf' 'ssh://git@github.com/'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""
          target: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build release binary
        run: cargo build -p end-cli --release --locked --target ${{ matrix.target }}

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-manual}"
          out_dir="dist"
          mkdir -p "${out_dir}"

          bin="end-cli"
          src="target/${{ matrix.target }}/release/${bin}"
          pkg="${bin}-${version}-${{ matrix.target }}"
          stage_dir="$(mktemp -d)"
          cp "${src}" "${stage_dir}/${bin}"
          tar -czf "${out_dir}/${pkg}.${{ matrix.archive_ext }}" -C "${stage_dir}" "${bin}"

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "manual" }
          $outDir = "dist"
          New-Item -Path $outDir -ItemType Directory -Force | Out-Null

          $bin = "end-cli"
          $src = "target/${{ matrix.target }}/release/$bin.exe"
          $pkg = "$bin-$version-${{ matrix.target }}"
          $stageDir = Join-Path $env:RUNNER_TEMP "release-stage"
          New-Item -Path $stageDir -ItemType Directory -Force | Out-Null
          $stagedExe = Join-Path $stageDir "$bin.exe"
          Copy-Item $src $stagedExe
          Compress-Archive -Path $stagedExe -DestinationPath "$outDir/$pkg.${{ matrix.archive_ext }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish-cli-release:
    name: Publish GitHub Release
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-tauri:
    name: Publish Tauri ${{ matrix.platform }}
    needs: publish-cli-release
    runs-on: ${{ matrix.platform }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: ""
            args: ""
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            rust_target: ""
            args: ""

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rewrite GitHub SSH URLs to HTTPS
        run: |
          git config --global 'url.https://github.com/.insteadOf' 'git@github.com:'
          git config --global --add 'url.https://github.com/.insteadOf' 'ssh://git@github.com/'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Install additional Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "web/src-tauri -> web/src-tauri/target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install web dependencies
        run: npm ci

      - name: Build and upload Tauri release assets
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
