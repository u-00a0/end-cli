# Example solve input for `end-cli`.
# Modify this file for your own use.
#
# Units:
# - power: watts (W)
# - item flows: units per minute
# - money cap: per hour

region = "fourth_valley"

# External power consumed by non-production systems.
external_power_consumption_w = 1800

[stage2]
objective = "max_money_slack"

# External item supply per minute.
[supply_per_min]
"Originium Ore" = 560
"Amethyst Ore" = 240
"Ferrium Ore" = 1080

# External item consumption per minute.
# e.g. Consumables, Delivery
[external_consumption_per_min]
"Industrial Explosive" = 6

[[outposts]]
# Unique identifier.
key = "Refugee Camp"
# Max revenue accepted by this outpost per hour.
money_cap_per_hour = 29148
# Display name (Optional).
en = "Refugee Camp"
zh = "难民暂居处"

# Item -> price
[outposts.prices]
"HC Valley Battery" = 70
"SC Valley Battery" = 30
"Buck Capsule (A)" = 70
"Buck Capsule (B)" = 27
"Buck Capsule (C)" = 10
